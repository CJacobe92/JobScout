services:
  db:
    image: postgres:latest
    container_name: db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - app
    healthcheck:
      test: [
          "CMD-SHELL",
          "pg_isready -U postgres -d jobscout_dev && \
          pg_isready -U postgres -d jobscout_dev_shard01 && \
          pg_isready -U postgres -d jobscout_dev_shard02 && \
          pg_isready -U postgres -d jobscout_test && \
          pg_isready -U postgres -d jobscout_test_shard01 && \
          pg_isready -U postgres -d jobscout_test_shard02 && \
          pg_isready -U postgres -d jobscout_prod && \
          pg_isready -U postgres -d jobscout_prod_shard01 && \
          pg_isready -U postgres -d jobscout_prod_shard02",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: postgres -c listen_addresses='*'
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:

networks:
  app: {}