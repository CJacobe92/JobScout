services:
  jobscout.api:
    image: ${DOCKER_REGISTRY-}jobscoutapi
    environment:
      - ASPNETCORE_URLS=https://localhost:8081
      - ASPNETCORE_ENVIRONMENT=Container
      - ASPNETCORE_HTTPS_PORTS=8081
      - ASPNETCORE_HTTPS_PORTS=8080
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=yourpassword
      # - DOTNET_ThreadPool_ForceMinWorkerThreads=512
      # - DOTNET_GCServer=1
      # - DOTNET_GCHeapHardLimit=0
      - APP_UID=1001
    ports:
      - 8081:8081
      - 8080:8080
    build:
      context: .
      dockerfile: src/JobScout.API/Dockerfile
    networks:
      - app
    volumes:
      - ./https:/https:ro


networks:
  app: {}
